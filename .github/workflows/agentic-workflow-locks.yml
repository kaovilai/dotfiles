name: Agentic Workflow Lock Files

on:
  pull_request:
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/*.lock.yml"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/*.lock.yml"
  schedule:
    # Weekly drift check in case the latest gh-aw compiler changes generated output.
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-lock-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install gh-aw (prerelease)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list --repo github/gh-aw --limit 1 --json tagName --jq '.[0].tagName')
          echo "Installing gh-aw $TAG"
          mkdir -p "$RUNNER_TEMP/gh-aw/bin"
          curl -fsSL "https://github.com/github/gh-aw/releases/download/${TAG}/linux-amd64" -o "$RUNNER_TEMP/gh-aw/linux-amd64"
          curl -fsSL "https://github.com/github/gh-aw/releases/download/${TAG}/checksums.txt" -o "$RUNNER_TEMP/gh-aw/checksums.txt"
          (
            cd "$RUNNER_TEMP/gh-aw" &&
            grep ' linux-amd64$' checksums.txt | sha256sum --check --status
          )
          mv "$RUNNER_TEMP/gh-aw/linux-amd64" "$RUNNER_TEMP/gh-aw/bin/gh-aw"
          chmod +x "$RUNNER_TEMP/gh-aw/bin/gh-aw"
          echo "$RUNNER_TEMP/gh-aw/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/gh-aw/bin/gh-aw" version

      - name: Compile agentic workflows
        run: gh-aw compile

      - name: Fail if lock files are stale
        run: |
          if git status --porcelain -- .github/workflows/*.lock.yml | grep -q .; then
            echo "::error::Lock files are stale. Run 'gh-aw compile' locally and commit the updated lock files."
            git --no-pager diff -- .github/workflows/*.lock.yml
            exit 1
          fi
